{
  "server": {
    "auth_mode": "api_key",
    "root_api_key": "$OPENVIKING_API_KEY"
  },
  "storage": {
    "workspace": "/data"
  },
  "embedding": {
    "dense": {
      "provider": "litellm",
      "model": "mistral/mistral-embed",
      "api_key": "$MISTRAL_API_KEY",
      "api_base": "https://api.mistral.ai/v1",
      "dimension": 1024
    }
  },
  "vlm": {
    "provider": "litellm",
    "model": "anthropic/claude-sonnet-4-5-20250514",
    "api_key": "$ANTHROPIC_API_KEY"
  }
}

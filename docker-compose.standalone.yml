services:
  traefik:
    image: traefik:v3
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:1933"
    expose:
      - "1933"
      - "8080"
    volumes:
      - ${DOCKER_HOST_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/overview || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  ov-work:
    build: .
    labels:
      traefik.enable: "true"
      traefik.http.routers.ov-work.rule: "PathPrefix(`/work`)"
      traefik.http.routers.ov-work.entrypoints: "web"
      traefik.http.services.ov-work.loadbalancer.server.port: "1940"
      traefik.http.middlewares.ov-work-strip.stripprefix.prefixes: "/work"
      traefik.http.routers.ov-work.middlewares: "ov-work-strip"
    volumes:
      - ./data/work:/data
      - ./ov.container.conf:/config/ov.conf:ro
    env_file: .env
    expose:
      - "1940"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:1940/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ov-personal:
    build: .
    labels:
      traefik.enable: "true"
      traefik.http.routers.ov-personal.rule: "PathPrefix(`/personal`)"
      traefik.http.routers.ov-personal.entrypoints: "web"
      traefik.http.services.ov-personal.loadbalancer.server.port: "1940"
      traefik.http.middlewares.ov-personal-strip.stripprefix.prefixes: "/personal"
      traefik.http.routers.ov-personal.middlewares: "ov-personal-strip"
    volumes:
      - ./data/personal:/data
      - ./ov.container.conf:/config/ov.conf:ro
    env_file: .env
    expose:
      - "1940"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:1940/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ov-mcp:
    build: .
    command: ["python", "mcp-server.py", "--host", "0.0.0.0", "--port", "2033"]
    env_file: .env
    environment:
      TRAEFIK_API_URL: "http://traefik:8080"
      TRAEFIK_ENTRYPOINT_URL: "http://traefik:1933"
    ports:
      - "2033:2033"
    depends_on:
      traefik:
        condition: service_healthy

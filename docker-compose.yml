services:
  ov-work:
    build: .
    volumes:
      - ./data/work:/data
      - ./ov.container.conf:/config/ov.conf:ro
    env_file: .env
    expose:
      - "1940"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:1940/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ov-personal:
    build: .
    volumes:
      - ./data/personal:/data
      - ./ov.container.conf:/config/ov.conf:ro
    env_file: .env
    expose:
      - "1940"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:1940/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "1933:1933"
    depends_on:
      ov-work:
        condition: service_healthy
      ov-personal:
        condition: service_healthy

  ov-mcp:
    build: .
    command: ["python", "mcp-server.py", "--host", "0.0.0.0", "--port", "2033"]
    env_file: .env
    environment:
      OPENVIKING_PROXY_HOST: nginx
    ports:
      - "2033:2033"
    depends_on:
      - nginx

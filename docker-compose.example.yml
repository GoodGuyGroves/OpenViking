# =============================================================================
# OpenViking — Example Docker Compose
# =============================================================================
#
# Two patterns are shown below:
#   A) Single instance (active)    — simplest setup, no reverse proxy needed
#   B) Multi-instance with Traefik — commented out, for running named instances
#
# Quick start:
#   1. Copy this file:   cp docker-compose.example.yml docker-compose.yml
#   2. Create your .env: cp .env.example .env  (and fill in API keys)
#   3. Run:              docker compose up -d
#
# =============================================================================

# ---------------------------------------------------------------------------
# Pattern A: Single Instance (default)
# ---------------------------------------------------------------------------
# One OpenViking instance exposed directly on port 1940. No proxy needed.

services:
  openviking:
    image: ghcr.io/goodguygroves/openviking:latest
    # Or build from source:
    # build: .
    ports:
      - "1940:1940"
    volumes:
      - ./data:/data
      # Optional: mount your own config file instead of using env vars.
      # When no config is mounted, the entrypoint generates one from env vars.
      # - ./my-config.conf:/config/ov.conf:ro
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:1940/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # Optional: MCP server for AI agent integration.
  # Connects directly to the OpenViking instance above — no Traefik required.
  #
  # openviking-mcp:
  #   image: ghcr.io/goodguygroves/openviking:latest
  #   command: ["python", "mcp-server.py", "--host", "0.0.0.0", "--port", "2033"]
  #   environment:
  #     OPENVIKING_INSTANCES: "default=http://openviking:1940"
  #   env_file: .env
  #   ports:
  #     - "2033:2033"
  #   depends_on:
  #     openviking:
  #       condition: service_healthy


